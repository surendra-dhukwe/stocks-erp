<!DOCTYPE html>
<html>
<head>
<title>Stock Transactions Report</title>
<link rel="stylesheet" href="css/style.css">

</head>

<body>

<h2>Stock Transactions Report</h2>

<div class="searchBox">

<input type="text"
id="searchInput"
placeholder="Search Code, Name, Types and Date"
onkeyup="filterTable()">

</div>


<table id="reportTable">

<thead>

<tr>

<th onclick="sortTable(0)">Code</th>
<th onclick="sortTable(1)">Name</th>
<th onclick="sortTable(2)">Quantity</th>
<th onclick="sortTable(3)">Types</th>
<th onclick="sortTable(4)">Date</th>

</tr>

</thead>

<tbody>

</tbody>

</table>



<script>

/* LOAD DATA */

window.onload=function(){

fetch("http://localhost:3000/all-transactions")

.then(res=>res.json())

.then(data=>{

const table=document.querySelector("#reportTable tbody");

table.innerHTML="";

data.forEach(item=>{

const row=table.insertRow();

row.innerHTML=`

<td>${item.code}</td>

<td>${item.name}</td>

<td>${item.total_quantity}</td>

<td class="${item.type=='dispatch'?'dispatch':'receive'}">

${item.type}

</td>

<td>

${new Date(item.entry_date).toLocaleString()}

</td>

`;

});

});

};



/* SEARCH */

function filterTable(){

const input=document.getElementById("searchInput");

const filter=input.value.toLowerCase();

const rows=document.querySelectorAll("#reportTable tbody tr");

rows.forEach(row=>{

const code=row.cells[0].innerText.toLowerCase();
const name=row.cells[1].innerText.toLowerCase();
const qty=row.cells[2].innerText.toLowerCase();
const type=row.cells[3].innerText.toLowerCase();
const date=row.cells[4].innerText.toLowerCase();

if(

code.includes(filter) ||

name.includes(filter) ||

qty.includes(filter) ||

type.includes(filter) ||

date.includes(filter)

){

row.style.display="";

}
else{

row.style.display="none";

}

});

}



/* SORT */

function sortTable(n){

const table=document.getElementById("reportTable");

let rows=Array.from(table.rows).slice(1);

rows.sort((a,b)=>{

let x=a.cells[n].innerText;
let y=b.cells[n].innerText;

return x.localeCompare(y,undefined,{numeric:true});

});

rows.forEach(row=>table.appendChild(row));

}


</script>

</body>
</html>
